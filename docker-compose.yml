version: "3.9"

# win443-honeypot — customer deployment
# All containers share the host network so real attacker IPs are captured.

services:
  honeypot:
    image: ghcr.io/kasowskipawel-hub/win443-honeypot:latest
    container_name: win443-honeypot
    network_mode: host
    volumes:
      - hp_data:/data
    environment:
      - LICENSE_KEY=${LICENSE_KEY}
      - LICENSE_SERVER=${LICENSE_SERVER:-https://license.ki-honeypot.de/api/license}
      - PORTS=443,80,8080,4443
      - SSH_PORTS=22,2222
      - REDIS_PORTS=6379
      - SMB_PORT=445
      - EVENTS=/data/events.jsonl
      - SAMPLE_DIR=/data/samples
      - CERT=/data/cert.pem
      - KEY=/data/key.pem
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - AI_STRATEGIST=${AI_STRATEGIST:-1}
    restart: unless-stopped
    command: python honeypot.py
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  enricher:
    image: ghcr.io/kasowskipawel-hub/win443-honeypot:latest
    container_name: win443-enricher
    network_mode: host
    volumes:
      - hp_data:/data
    environment:
      - LICENSE_KEY=${LICENSE_KEY}
      - LICENSE_SERVER=${LICENSE_SERVER:-https://license.ki-honeypot.de/api/license}
      - EVENTS=/data/events.jsonl
      - ENRICHED=/data/enriched.jsonl
      - ENRICH_INTERVAL=3
      - VT_API_KEY=${VT_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
    restart: unless-stopped
    command: python enricher.py
    depends_on:
      - honeypot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    image: ghcr.io/kasowskipawel-hub/win443-honeypot:latest
    container_name: win443-dashboard
    network_mode: host
    volumes:
      - hp_data:/data
    environment:
      - LICENSE_KEY=${LICENSE_KEY}
      - LICENSE_SERVER=${LICENSE_SERVER:-https://license.ki-honeypot.de/api/license}
      - ENRICHED=/data/enriched.jsonl
      - EVENTS=/data/events.jsonl
      - DASH_PORT=9090
      - DASH_PASSWORD=${DASH_PASSWORD:-honeypot2026}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
    restart: unless-stopped
    command: python dashboard.py
    depends_on:
      - enricher
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hp_data:
    driver: local
